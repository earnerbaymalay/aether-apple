<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; rx: 10; }
    .card-border { stroke: #30363d; stroke-width: 1; fill: none; rx: 10; }
    .title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 600; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
    .small { font-family: -apple-system, sans-serif; font-size: 10px; }
    .white { fill: #e6edf3; }
    .dim { fill: #8b949e; }
    .blue { fill: #58a6ff; }
    .green { fill: #3fb950; }
    .purple { fill: #bc8cff; }
    .orange { fill: #ffa657; }
  </style>

  <rect width="600" height="380" class="bg" rx="10"/>

  <!-- macOS Terminal -->
  <rect x="20" y="20" width="270" height="340" class="card"/>
  <rect x="20" y="20" width="270" height="340" class="card-border" stroke="#3fb950" stroke-width="1.5"/>

  <rect x="20" y="20" width="270" height="24" rx="10" fill="#1c2129"/>
  <circle cx="36" cy="32" r="5" fill="#ff5f57"/>
  <circle cx="52" cy="32" r="5" fill="#febc2e"/>
  <circle cx="68" cy="32" r="5" fill="#28c840"/>
  <text x="290" y="36" class="small dim" text-anchor="middle">macOS Terminal</text>

  <text x="40" y="70" class="mono green">  ╔══════════════════════════════╗</text>
  <text x="40" y="88" class="mono green">  ║  🌌  AETHER 🌌              ║</text>
  <text x="40" y="106" class="mono dim">  ║  APPLE ED. // V 2.0 // macos ║</text>
  <text x="40" y="124" class="mono green">  ╚══════════════════════════════╝</text>
  <text x="40" y="148" class="mono dim">   Apple M1 | 16384MB | Disk: 142G</text>

  <text x="40" y="176" class="mono white">  ┌─────────────────────────────────┐</text>
  <text x="40" y="194" class="mono white">  │  [ SELECT NEURAL PATHWAY ]      │</text>
  <text x="40" y="216" class="mono white">  │  1) 🤖  CHAT  (Default Model)   │</text>
  <text x="40" y="234" class="mono dim">  │  2) ⚡  TURBO (Faster Model)     │</text>
  <text x="40" y="252" class="mono dim">  │  3) 🛠️  TOOLS (System Toolbox) │</text>
  <text x="40" y="270" class="mono dim">  │  4) 📖  KNOWLEDGE (Vault)       │</text>
  <text x="40" y="288" class="mono dim">  │  5) ℹ️  PLATFORM INFO           │</text>
  <text x="40" y="306" class="mono dim">  │  6) ❌  EXIT                     │</text>
  <text x="40" y="324" class="mono white">  └─────────────────────────────────┘</text>

  <rect x="60" y="340" width="6" height="12" class="blue"/>

  <!-- iPad Terminal -->
  <rect x="310" y="20" width="270" height="340" class="card"/>
  <rect x="310" y="20" width="270" height="340" class="card-border" stroke="#bc8cff" stroke-width="1.5"/>

  <rect x="310" y="20" width="270" height="24" rx="10" fill="#1c2129"/>
  <circle cx="326" cy="32" r="5" fill="#ff5f57"/>
  <circle cx="342" cy="32" r="5" fill="#febc2e"/>
  <circle cx="358" cy="32" r="5" fill="#28c840"/>
  <text x="580" y="36" class="small dim" text-anchor="middle">iPad · iSH Shell</text>

  <text x="330" y="70" class="mono purple">  ╔══════════════════════════════╗</text>
  <text x="330" y="88" class="mono purple">  ║  🌌  AETHER 🌌              ║</text>
  <text x="330" y="106" class="mono dim">  ║  APPLE ED. // V 2.0 // iSH   ║</text>
  <text x="330" y="124" class="mono purple">  ╚══════════════════════════════╝</text>
  <text x="330" y="148" class="mono dim">   iSH x86 | RAM: 1024MB | 42G</text>

  <text x="330" y="176" class="mono white">  ┌─────────────────────────────────┐</text>
  <text x="330" y="194" class="mono white">  │  [ SELECT NEURAL PATHWAY ]      │</text>
  <text x="330" y="216" class="mono white">  │  1) 🤖  CHAT  (Default Model)   │</text>
  <text x="330" y="234" class="mono dim">  │  2) ⚡  TURBO (Faster Model)     │</text>
  <text x="330" y="252" class="mono dim">  │  3) 🛠️  TOOLS (System Toolbox) │</text>
  <text x="330" y="270" class="mono dim">  │  4) 📖  KNOWLEDGE (Vault)       │</text>
  <text x="330" y="288" class="mono dim">  │  5) ℹ️  PLATFORM INFO           │</text>
  <text x="330" y="306" class="mono dim">  │  6) ❌  EXIT                     │</text>
  <text x="330" y="324" class="mono white">  └─────────────────────────────────┘</text>

  <rect x="350" y="340" width="6" height="12" class="purple"/>
</svg>
